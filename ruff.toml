target-version = "py39"
line-length = 99

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "SIM108", # ternary operator
    "UP007",  # Use X | Y for union types (need 3.9 compat)
]

[lint.isort]
known-first-party = ["aigov_shield"]

[format]
quote-style = "double"
indent-style = "space"
